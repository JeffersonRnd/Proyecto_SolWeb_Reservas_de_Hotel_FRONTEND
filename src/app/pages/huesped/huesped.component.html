<router-outlet></router-outlet>

<div class="page-container">
  <div class="page-header">
    <div>
      <h2 class="page-title"><mat-icon>people</mat-icon> Huéspedes</h2>
      <p class="page-subtitle">Listado de huéspedes registrados</p>
    </div>
    <button mat-raised-button color="primary" routerLink="/pages/huesped/new">
      <mat-icon>person_add</mat-icon> Nuevo huésped
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar huésped...</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ej: Juan" #input>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-card mat-elevation-z2">
    <table mat-table [dataSource]="$dataSource()" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let row">{{row.id}}</td>
      </ng-container>
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row"><strong>{{row.nombre}}</strong></td>
      </ng-container>
      <ng-container matColumnDef="apellido">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
        <td mat-cell *matCellDef="let row">{{row.apellido}}</td>
      </ng-container>
      <ng-container matColumnDef="dni">
        <th mat-header-cell *matHeaderCellDef>DNI</th>
        <td mat-cell *matCellDef="let row">{{row.dni}}</td>
      </ng-container>
      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let row">{{row.correo}}</td>
      </ng-container>
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let row">{{row.telefono}}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" [routerLink]="['edit', row.id]" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(row.id)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="7">Sin resultados para "{{input.value}}"</td>
      </tr>
    </table>
  </div>
</div>
