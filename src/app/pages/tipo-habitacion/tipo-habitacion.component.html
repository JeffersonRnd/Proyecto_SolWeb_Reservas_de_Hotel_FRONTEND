<router-outlet></router-outlet>

<div class="page-container">
  <div class="page-header">
    <div>
      <h2 class="page-title"><mat-icon>category</mat-icon> Tipos de Habitación</h2>
      <p class="page-subtitle">Gestiona las categorías de habitaciones del hotel</p>
    </div>
    <button mat-raised-button color="primary" routerLink="/pages/tipo-habitacion/new">
      <mat-icon>add</mat-icon> Nueva categoría
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar tipo...</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ej: Suite" #input>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-card mat-elevation-z2">
    <table mat-table [dataSource]="$dataSource()" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let row">{{row.id}}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row"><strong>{{row.nombre}}</strong></td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let row" class="desc-cell">{{row.descripcion}}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" [routerLink]="['edit', row.id]" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(row.id)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="4">Sin resultados para "{{input.value}}"</td>
      </tr>
    </table>
  </div>
</div>
