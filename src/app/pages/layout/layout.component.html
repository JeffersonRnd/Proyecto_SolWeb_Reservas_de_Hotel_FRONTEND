<div class="example-container">
  <mat-toolbar class="example-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()">
      @if (!sidenav.opened) { <mat-icon>menu</mat-icon> }
      @else { <mat-icon>close</mat-icon> }
    </button>
    <mat-icon style="margin: 0 8px">hotel</mat-icon>
    <span>Hotel Reservas</span>
    <span class="example-spacer"></span>
    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item disabled>
        <mat-icon>badge</mat-icon>
        <span>{{ getRol() }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon><span>Cerrar sesión</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="example-sidenav-container">
    <mat-sidenav #sidenav style="width: 240px" mode="side" opened>

      @if (isAdmin()) {
        <div class="nav-section-title">Administración</div>
        <button class="myButton" [routerLinkActive]="['active']" mat-menu-item routerLink="/pages/tipo-habitacion">
          <mat-icon>category</mat-icon><span>Tipos de Habitación</span>
        </button>
        <button class="myButton" [routerLinkActive]="['active']" mat-menu-item routerLink="/pages/habitacion">
          <mat-icon>bed</mat-icon><span>Habitaciones</span>
        </button>
        <button class="myButton" [routerLinkActive]="['active']" mat-menu-item routerLink="/pages/huesped">
          <mat-icon>people</mat-icon><span>Huéspedes</span>
        </button>
        <mat-divider></mat-divider>
        <div class="nav-section-title">Operaciones</div>
        <button class="myButton" [routerLinkActive]="['active']" mat-menu-item routerLink="/pages/reserva">
          <mat-icon>book_online</mat-icon><span>Reservas</span>
        </button>
      }

      @if (isHuesped()) {
        <div class="nav-section-title">Mi cuenta</div>
        <button class="myButton" [routerLinkActive]="['active']" mat-menu-item routerLink="/pages/reserva">
          <mat-icon>book_online</mat-icon><span>Mis Reservas</span>
        </button>
      }

    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
