<router-outlet></router-outlet>

<mat-form-field style="width:100%">
  <mat-label>Buscar</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Ej: 101" #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="$dataSource()" matSort>

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let row">{{row.id}}</td>
    </ng-container>
    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>N°</th>
      <td mat-cell *matCellDef="let row">{{row.numero}}</td>
    </ng-container>
    <ng-container matColumnDef="tipoHabitacion">
      <th mat-header-cell *matHeaderCellDef>TIPO</th>
      <td mat-cell *matCellDef="let row">{{row.tipoHabitacion?.nombre}}</td>
    </ng-container>
    <ng-container matColumnDef="precioPorNoche">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>PRECIO/NOCHE</th>
      <td mat-cell *matCellDef="let row">S/. {{row.precioPorNoche}}</td>
    </ng-container>
    <ng-container matColumnDef="capacidad">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>CAPACIDAD</th>
      <td mat-cell *matCellDef="let row">{{row.capacidad}}</td>
    </ng-container>
    <ng-container matColumnDef="disponible">
      <th mat-header-cell *matHeaderCellDef>DISPONIBLE</th>
      <td mat-cell *matCellDef="let row">{{row.disponible ? 'Sí' : 'No'}}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>ACCIONES</th>
      <td mat-cell *matCellDef="let row">
        <button mat-flat-button [routerLink]="['edit', row.id]">
          <mat-icon>edit</mat-icon> Editar
        </button>
        <button mat-flat-button class="cancel-button" (click)="delete(row.id)">
          <mat-icon>delete</mat-icon> Eliminar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="7">Sin resultados para "{{input.value}}"</td>
    </tr>
  </table>
  <mat-paginator [pageSizeOptions]="[5, 10, 25]"></mat-paginator>
  <button mat-fab style="float:right; margin:8px" routerLink="/pages/habitacion/new">
    <mat-icon>add</mat-icon>
  </button>
</div>
