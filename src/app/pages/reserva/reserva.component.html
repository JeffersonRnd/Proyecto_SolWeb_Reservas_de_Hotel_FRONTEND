<router-outlet></router-outlet>

<div class="page-container">
  <div class="page-header">
    <div>
      <h2 class="page-title"><mat-icon>book_online</mat-icon> Reservas</h2>
      <p class="page-subtitle">Gestiona las reservas del hotel</p>
    </div>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Nueva reserva
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar reserva...</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ej: PENDIENTE" #input>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-card mat-elevation-z2">
    <table mat-table [dataSource]="$dataSource()" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let row">{{row.id}}</td>
      </ng-container>

      <ng-container matColumnDef="huesped">
        <th mat-header-cell *matHeaderCellDef>Huésped</th>
        <td mat-cell *matCellDef="let row"><strong>{{row.huespedNombre}}</strong></td>
      </ng-container>

      <ng-container matColumnDef="fechaIngreso">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Ingreso</th>
        <td mat-cell *matCellDef="let row">{{row.fechaIngreso}}</td>
      </ng-container>

      <ng-container matColumnDef="fechaSalida">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Salida</th>
        <td mat-cell *matCellDef="let row">{{row.fechaSalida}}</td>
      </ng-container>

      <ng-container matColumnDef="totalPagar">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
        <td mat-cell *matCellDef="let row" class="precio-cell">S/. {{row.totalPagar}}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">
          <span class="badge" [ngClass]="'badge-' + row.estado?.toLowerCase()">{{row.estado}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openDialog(row)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(row.id)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="7">Sin resultados para "{{input.value}}"</td>
      </tr>
    </table>
  </div>
</div>
